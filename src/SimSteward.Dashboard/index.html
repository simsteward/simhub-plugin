<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sim Steward</title>
<style>
:root {
  --bg: #080808; --bg2: #0e0e0e;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --accent: #1f9cff; --green: #0ef272;
  --red: #ff5f5f; --yellow: #ffc840; --cyan: #0dd8ff;
  --text: #f0f0f0; --muted: rgba(240,240,240,0.4);
  --r: 10px;
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

.app { height: 100vh; display: flex; flex-direction: column; gap: 8px; padding: 8px; }

/* ── Status bar ── */
.status-bar {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 7px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r);
}
.mode-pill {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 99px; font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid currentColor;
}
.mode-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.mode-pill.replay  { color: var(--accent); background: rgba(31,156,255,0.07); }
.mode-pill.waiting { color: var(--muted); background: transparent; }
.session-time { font-family: "Courier New", monospace; font-size: 0.95rem; }
.sb-spacer { flex: 1; }
.diag-row { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: var(--muted); }
.diag-item { display: flex; align-items: center; gap: 4px; }
.d-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.12); }
.d-dot.ok   { background: var(--green); box-shadow: 0 0 4px rgba(14,242,114,0.5); }
.d-dot.err  { background: var(--red); }
.d-dot.warn { background: var(--yellow); }
.ws-badge {
  font-size: 0.68rem; padding: 2px 8px; border-radius: 99px; border: 1px solid; cursor: default;
}
.ws-badge.connected    { color: var(--green);  border-color: rgba(14,242,114,0.3); background: rgba(14,242,114,0.07); }
.ws-badge.disconnected { color: var(--red);    border-color: rgba(255,95,95,0.3);  background: rgba(255,95,95,0.07); }
.ws-badge.connecting   { color: var(--yellow); border-color: rgba(255,200,64,0.3); background: rgba(255,200,64,0.07); }

/* ── Main grid ── */
.main-grid {
  flex: 1; display: grid; grid-template-columns: 300px 1fr;
  gap: 8px; min-height: 0; overflow: hidden;
}
.left-col {
  display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.right-col { display: flex; flex-direction: column; gap: 8px; min-height: 0; overflow: hidden; }
.right-col > .standings-panel {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.right-col > .standings-panel .std-body { flex: 1; min-height: 0; overflow-y: auto; }

/* ── Panel ── */
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; flex-shrink: 0; }
.panel-title { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }

/* ── Replay ── */
.btn-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 10px; }
.btn {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px;
  background: rgba(255,255,255,0.03); color: var(--text); font-size: 1rem;
  cursor: pointer; transition: border-color 0.15s, background 0.15s; line-height: 1; min-width: 36px; text-align: center;
}
.btn:hover  { border-color: var(--accent); background: rgba(31,156,255,0.1); }
.btn:active { transform: scale(0.96); }
.btn.label-inc {
  flex: 1;
  min-width: 0;
  font-size: 0.62rem;
  font-weight: 600;
  line-height: 1.2;
  padding: 7px 6px;
  white-space: normal;
  text-align: center;
}
.speed-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.spill {
  flex: 1; padding: 4px 4px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--muted); font-size: 0.7rem;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.spill:hover { border-color: var(--accent); color: var(--text); }
.spill.active { border-color: var(--accent); background: rgba(31,156,255,0.15); color: var(--accent); }
.scrub-row { display: flex; flex-direction: column; gap: 4px; }
.scrub-labels { display: flex; justify-content: space-between; font-size: 0.67rem; color: var(--muted); }
.scrub-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; cursor: pointer; }
.scrub-fill { height: 100%; width: 38%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 4px; transition: width 0.2s; }
.replay-session-row {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.replay-session-row .replay-session-meta {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 8px;
}
.replay-session-lbl {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.replay-session-text {
  font-size: 0.78rem;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
}
.replay-session-row .btn-row { margin-bottom: 0; }
.panel-sub {
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
}
.panel-sub-title {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-sub .car-sel { margin-bottom: 0; }
.cap-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.btn.cap { font-size: 0.8rem; padding: 7px 14px; flex-shrink: 0; border-color: var(--accent); color: var(--accent); background: rgba(31,156,255,0.07); }
.btn.cap.btn-scan {
  flex: 1;
  min-width: 0;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: normal;
  line-height: 1.25;
  padding: 8px 10px;
  text-align: center;
}
.btn.cap:hover { background: rgba(31,156,255,0.16); }
.btn.cap.active { border-color: var(--red); color: var(--red); background: rgba(255,95,95,0.07); animation: cap-pulse 1.2s ease-in-out infinite; }
.btn.cap.btn-scan.btn-scan-session {
  border-color: rgba(255, 180, 72, 0.85);
  color: #e8b060;
  background: rgba(255, 180, 72, 0.08);
}
.btn.cap:disabled { opacity: 0.45; cursor: not-allowed; }
.cap-row .cap-status { flex: 1 1 100%; margin-top: 4px; }
.cap-status { font-size: 0.7rem; color: var(--muted); }
.cap-status.running { color: var(--accent); }
@keyframes cap-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

/* ── Telemetry ── */
.car-sel {
  width: 100%; padding: 5px 8px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  font-size: 0.82rem; margin-bottom: 10px; cursor: pointer;
}
.input-rows { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.input-lbl { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); margin-bottom: 3px; }
.bar-track { height: 10px; background: rgba(255,255,255,0.06); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.08s ease; }
.bar-fill.thr { background: linear-gradient(90deg, #0a7a35, var(--green)); }
.bar-fill.brk { background: linear-gradient(90deg, #7a0a0a, var(--red)); }
.steer-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.steer-lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.steer-svg { width: 100%; max-width: 210px; }
.g-track  { stroke: rgba(255,255,255,0.09); stroke-width: 5; fill: none; stroke-linecap: round; }
.g-active { stroke: var(--accent); stroke-width: 5; fill: none; stroke-linecap: round; }
.g-ctick  { stroke: rgba(255,255,255,0.35); stroke-width: 1.5; }
.g-needle { stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }
.g-hub    { fill: var(--accent); }
.g-text   { fill: rgba(240,240,240,0.4); font-size: 8px; font-family: "Courier New", monospace; }
.g-angle  { fill: rgba(240,240,240,0.6); font-size: 9px; font-family: "Courier New", monospace; }

/* ── Incidents panel ── */
.incidents-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.inc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
.chips { display: flex; gap: 4px; }
.chip {
  padding: 2px 9px; border: 1px solid var(--border); border-radius: 99px;
  font-size: 0.68rem; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.chip:hover  { border-color: var(--accent); color: var(--text); }
.chip.active { border-color: var(--accent); background: rgba(31,156,255,0.12); color: var(--accent); }
.inc-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.inc-card {
  display: grid; grid-template-columns: 2.4rem 1fr auto auto auto;
  align-items: center; gap: 8px; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: 8px;
  background: rgba(255,255,255,0.02); cursor: pointer; flex-shrink: 0;
  transition: background 0.12s, border-color 0.12s;
}
.inc-card:hover  { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); }
.inc-card.player { border-left: 3px solid var(--accent); background: rgba(31,156,255,0.04); }
.car-num { font-family: "Courier New", monospace; font-size: 0.7rem; text-align: center; background: rgba(255,255,255,0.07); border-radius: 4px; padding: 2px 4px; color: var(--muted); }
.inc-name { font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inc-time { font-family: "Courier New", monospace; font-size: 0.7rem; color: var(--muted); }
.sev-badge { font-family: "Courier New", monospace; font-size: 0.7rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; min-width: 26px; text-align: center; }
.sev-badge.s1 { background: rgba(14,242,114,0.12);  color: var(--green); }
.sev-badge.s2 { background: rgba(255,200,64,0.12);  color: var(--yellow); }
.sev-badge.s4 { background: rgba(255,95,95,0.12);   color: var(--red); }
.cause-tag { font-size: 0.63rem; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.cause-tag.off-track { background: rgba(14,242,114,0.1);  color: var(--green); }
.cause-tag.wall      { background: rgba(255,200,64,0.1);  color: var(--yellow); }
.cause-tag.spin      { background: rgba(255,200,64,0.1);  color: var(--yellow); }
.cause-tag.contact   { background: rgba(255,95,95,0.1);   color: var(--red); }
.cause-tag.unknown   { background: rgba(255,255,255,0.06); color: var(--muted); }

/* ── Standings ── */
.std-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.std-header:hover .chev { color: var(--text); }
.chev { color: var(--muted); font-size: 0.7rem; transition: transform 0.15s, color 0.15s; }
.standings-panel.open .chev { transform: rotate(180deg); }
.std-body { margin-top: 8px; }
.standings-panel:not(.open) .std-body { display: none; }
.std-row { display: grid; grid-template-columns: 1.6rem 2.2rem 1fr auto; gap: 8px; align-items: center; padding: 5px 6px; border-radius: 6px; font-size: 0.82rem; transition: background 0.1s; }
.std-row:hover         { background: rgba(255,255,255,0.03); }
.std-row.player        { background: rgba(31,156,255,0.06); }
.std-row.hdr           { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; }
.std-pos               { color: var(--muted); font-size: 0.7rem; }
.std-inc               { font-family: "Courier New", monospace; font-weight: 600; text-align: right; }
.std-inc.zero          { color: var(--muted); }
.std-inc.low           { color: var(--green); }
.std-inc.mid           { color: var(--yellow); }
.std-inc.high          { color: var(--red); }

/* ── Log section ── */
.log-section {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.log-tabs { display: flex; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.log-tab {
  padding: 7px 14px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); cursor: pointer; border: none; border-bottom: 2px solid transparent;
  background: transparent; transition: color 0.15s, border-color 0.15s; user-select: none;
}
.log-tab:hover  { color: var(--text); }
.log-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.log-autoscroll {
  margin-left: auto; display: flex; align-items: center; gap: 4px;
  padding: 0 12px; font-size: 0.67rem; color: var(--muted); cursor: pointer; user-select: none; border: none; background: transparent;
}
.log-autoscroll.on { color: var(--accent); }
.log-pane {
  flex: 1; overflow-y: auto; padding: 5px 10px; font-family: "Courier New", monospace;
  font-size: 0.73rem; line-height: 1.55; display: none;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.log-pane.active { display: block; }
.ll { white-space: pre; }
.ll.info  { color: rgba(240,240,240,0.55); }
.ll.warn  { color: var(--yellow); }
.ll.error { color: var(--red); }
.ll.event { color: var(--cyan); }
.ll.debug { color: rgba(240,240,240,0.25); }
.ll.data  { color: rgba(13,216,255,0.7); }

/* ── Bottom dock: telemetry + tabbed logs (leaderboard & captured are last tabs) ── */
.bottom-dock-rows {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
}
.bottom-dock-main {
  display: flex;
  gap: 8px;
  min-height: 0;
  height: 300px;
}
.log-section--telemetry {
  width: 300px;
  flex: none;
  flex-shrink: 0;
}
.log-section-head {
  flex-shrink: 0;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
}
.log-section--telemetry .log-section-head { padding: 6px 10px 4px; }
.log-section-head .panel-title { margin-bottom: 0; }
.log-section-body--telem {
  flex: 1;
  min-height: 0;
  padding: 6px 8px 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.log-section--telemetry .input-rows {
  gap: 4px;
  margin-bottom: 4px;
}
.log-section--telemetry .input-lbl { margin-bottom: 2px; }
.log-section--telemetry .bar-track { height: 6px; border-radius: 3px; }
.log-section--telemetry .bar-fill { border-radius: 3px; }
.log-section--telemetry .steer-wrap { gap: 2px; }
.log-section--telemetry .steer-lbl { font-size: 0.62rem; }
.log-section--telemetry .steer-svg { max-width: 150px; }
.log-section--streams {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.log-section--streams .log-pane { flex: 1; min-height: 0; }
.log-section-toolbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0 8px;
  font-size: 0.68rem;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.log-section-toolbar label { cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
.log-section-toolbar input { accent-color: var(--accent); }
.leaderboard-pane-stack {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  gap: 6px;
}
.leaderboard-pane-stack .inc-header { flex-shrink: 0; margin-bottom: 0; }
.leaderboard-pane-stack .inc-list { flex: 1; min-height: 0; }
.log-pane.incidents-pane {
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.82rem;
  padding: 8px 10px;
  flex-direction: column;
}
.log-pane.incidents-pane.active {
  display: flex;
  flex-direction: column;
}
.log-pane.incidents-pane .inc-list { flex: 1; min-height: 0; }
.captured-pane-inner {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.captured-pane-inner .inc-list { flex: 1; min-height: 0; }
.driver-inc-panel {
  max-height: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.driver-inc-panel .inc-list { flex: 1; min-height: 0; }
.captured-group {
  border-top: 1px solid var(--border);
}
.captured-group:first-child {
  border-top: none;
}
.captured-group-hdr {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  padding: 8px 4px 6px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 4px;
}
.captured-group:first-child .captured-group-hdr { padding-top: 0; }
.captured-group-hdr:hover { background: rgba(255,255,255,0.04); }
.captured-group-chev {
  font-size: 0.55rem;
  color: var(--muted);
  width: 1em;
  flex-shrink: 0;
  line-height: 1;
}
.captured-group-title { flex: 1; min-width: 0; }
.captured-group.collapsed .captured-group-body { display: none; }
.log-pane.meta-pane {
  font-family: "Segoe UI", system-ui, sans-serif;
  font-size: 0.72rem;
  line-height: 1.45;
  padding: 8px 12px;
}
.im-block {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.im-block:last-child { border-bottom: none; }
.im-meta-hdr {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 6px;
}
.im-row { color: var(--text); margin: 2px 0; word-break: break-word; }
.im-row code { font-family: "Courier New", monospace; font-size: 0.7rem; color: var(--cyan); }
.im-future { font-size: 0.65rem; color: var(--muted); font-style: italic; margin-top: 6px; }
.incident-meta-strip {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.025);
  max-height: 132px;
  overflow-y: auto;
  padding: 8px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  transition: max-height 0.18s ease, padding 0.18s ease, border-width 0.18s ease;
}
.incident-meta-strip.collapsed {
  max-height: 0;
  min-height: 0;
  padding: 0;
  border-bottom-width: 0;
  overflow: hidden;
}
.inc-card.inc-card-expanded {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  background: rgba(255,255,255,0.06);
}
.im-strip-placeholder { font-size: 0.72rem; color: var(--muted); }
.im-block-single { padding: 0; border: none; margin: 0; }
.im-row-muted { font-size: 0.65rem; color: var(--muted); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 18px; right: 18px; max-width: min(420px, calc(100vw - 36px)); padding: 9px 15px;
  background: rgba(18,18,22,0.97); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.8rem; line-height: 1.35; color: var(--text); opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Status bar ── -->
  <header class="status-bar">
    <div class="mode-pill waiting" id="mode-pill"><span class="dot"></span><span id="mode-text">WAITING</span></div>
    <span class="session-time" id="session-time">—:——</span>
    <div class="sb-spacer"></div>
    <div class="diag-row">
      <span class="diag-item"><span class="d-dot" id="d-irsdk"></span>iRacing</span>
      <span class="diag-item"><span class="d-dot" id="d-steam"></span>Steam</span>
      <span class="diag-item"><span class="d-dot" id="d-simhub"></span>SimHub</span>
    </div>

<script>
// ── Config ──────────────────────────────────────────────
const WS_PORT = 19847;
function wsUrl() {
  const h = window.location.hostname || 'localhost';
  return 'ws://' + h + ':' + WS_PORT;
}
const LOG_MAX        = 500;
const STEER_MAX_RAD = 7.0;
/** 180° axis: 90° = straight; left end 0°, right end 180°; +vd = CW on gauge = toward 180° (steer right). */
const STEER_AXIS_HALF_DEG = 90;

// ── Mock data ────────────────────────────────────────────
const MOCK_INC = [
  { id:1, time:'12:34.5', car:99, driver:'J. Smith',  sev:4, cause:'contact',  frame:54321, lap:12, player:true  },
  { id:2, time:'12:20.1', car:12, driver:'A. Jones',  sev:2, cause:'wall',     frame:52100, lap:11, player:false },
  { id:3, time:'11:45.8', car:42, driver:'B. Lee',    sev:1, cause:'off-track',frame:48900, lap:11, player:false },
  { id:4, time:'11:12.3', car:7,  driver:'M. Wilson', sev:4, cause:'contact',  frame:45200, lap:10, player:false },
  { id:5, time:'10:55.0', car:99, driver:'J. Smith',  sev:2, cause:'spin',     frame:44100, lap:10, player:true  },
];
const MOCK_DRV = [
  { pos:1, car:99, name:'J. Smith',  inc:6, player:true  },
  { pos:2, car:7,  name:'M. Wilson', inc:4, player:false },
  { pos:3, car:12, name:'A. Jones',  inc:2, player:false },
  { pos:4, car:42, name:'B. Lee',    inc:1, player:false },
];
const MOCK_CAR_TELEM = [
  { t:0.65, b:0.00, s: 0.30 },
  { t:0.90, b:0.00, s:-1.20 },
  { t:0.00, b:0.75, s: 2.10 },
  { t:0.45, b:0.00, s:-3.50 },
];

// ── State ────────────────────────────────────────────────
let incidents   = [...MOCK_INC];
let drivers     = [...MOCK_DRV];
let capturedIncidents = [];
let capturedGroupByDriver = false;
/** Driver group labels (group-by-driver mode); when present, that group's rows are hidden. */
let capturedDriverGroupsCollapsed = new Set();
let incFilter   = 'all';
let autoScroll  = true;
let activeTab   = 'events';
let ws          = null;
let mockTime    = 0;
let mockPaused  = false;  // paused when real WS connected
let mockTelem   = { t:0.65, b:0.00, s:0.30 };
let replayPaused = false;
let lastReplaySpeed = '1';
/** Focus-car lap from plugin state (telemetry CarIdxLap); -1 if unknown. */
let lastLap = -1;
/** @type {{ kind:'session', frame:number } | { kind:'capture', seq:number } | null} */
let incidentMetaSelection = null;
let selectedIncident = null;
let cameraGroups = [];
/** Latest telemetry object from plugin state (throttle, brake, steeringWheelAngle); null before first state. */
let lastPluginTelemetry = null;
/** Last replay frame number from plugin state (for capture walk handshake). */
let lastPluginFrame = 0;

// ── WebSocket ────────────────────────────────────────────
function connectWs() {
  try {
    setWs('connecting');
    const url = wsUrl();
    ws = new WebSocket(url);
    ws.onopen = () => {
      setWs('connected');
      mockPaused = true;
      incidents = [];
      drivers = [];
      selectedIncident = null;
      hideSelectedIncidentPanel();
      cameraGroups = [];
      lastPluginTelemetry = null;
      renderInc();
      renderStd();
      log('health','INFO ','ws_connected','WebSocket connected to plugin at ' + url);
    };
    ws.onclose = () => {
      ws = null; mockPaused = false;
      setWs('disconnected');
      log('health','WARN ','ws_closed','Connection lost — retrying in 3 s');
      setTimeout(connectWs, 3000);
    };
    ws.onerror = () => { ws = null; mockPaused = false; };
    ws.onmessage = e => { try { onMsg(JSON.parse(e.data)); } catch {} };
  } catch {
    setWs('disconnected');
    setTimeout(connectWs, 3000);
  }
}

function send(action, arg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return false;
  ws.send(JSON.stringify({ action, arg: arg ?? '' }));
  return true;
}

/** Structured UI telemetry for Loki (plugin → plugin-structured.jsonl; ingestion outside plugin). */
function sendDashboardUiEvent({ element_id, event_type, message, value }) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return false;
  const o = { action: 'log', event: 'dashboard_ui_event', element_id, event_type, message };
  if (value !== undefined && value !== null) o.value = value;
  try {
    ws.send(JSON.stringify(o));
    return true;
  } catch {
    return false;
  }
}

function onMsg(m) {
  if (!m || !m.type) return;
  if (m.type === 'state')         onState(m);
  else if (m.type === 'logEvents')  (m.entries || []).forEach(e => log('health', (e.level||'INFO').toUpperCase().padEnd(5), e.event||'', e.message||''));
  else if (m.type === 'incidents')  { incidents = m.entries || []; renderInc(); }
  else if (m.type === 'iracingEvent') log('events','EVENT', m.event||'event', m.data||JSON.stringify(m));
  else if (m.type === 'telemetryData') log('telem','DATA ', 'telemetry', fmtTelem(m));
  else if (m.type === 'actionResult') onActionResult(m);
  else if (m.type === 'pong') {}
}

/** Plugin ack for dashboard actions (see DashboardBridge.SendActionResult). */
function onActionResult(m) {
  if (m.success) return;
  const err = m.error || '';
  if (err === 'not_connected') {
    const a = m.action || 'unknown';
    toast('Not connected — iRacing isn’t running or has no active session for this plugin. Open the sim or load a replay, then try again.', 4200, 'actionResult:not_connected:' + a);
  }
}

// ── State update ─────────────────────────────────────────
function onState(m) {
  const mode = m.pluginMode || 'Unknown';
  const pill = document.getElementById('mode-pill');
  pill.className = 'mode-pill ' + (mode==='Replay'?'replay':'waiting');
  document.getElementById('mode-text').textContent = mode.toUpperCase();
  document.getElementById('session-time').textContent = m.currentSessionTimeFormatted || '—:——';
  const d = m.diagnostics || {};
  setDot('d-irsdk',  d.irsdkConnected);
  setDot('d-steam',  d.steamRunning);
  setDot('d-simhub', d.simHubHttpListening);
  if (m.telemetry) setTelem(m.telemetry.throttle||0, m.telemetry.brake||0, m.telemetry.steeringWheelAngle||0);
  if (m.drivers && Array.isArray(m.drivers)) {
    drivers = m.drivers.map((d, ix) => ({
      pos: ix + 1,
      car: d.carNum,
      name: d.name,
      inc: 0,
      player: !!d.isPlayer
    }));
    renderStd();
    populateCarDropdown(m.drivers);
  }
  if (Array.isArray(m.cameraGroups) && m.cameraGroups.length) {
    cameraGroups = m.cameraGroups;
    populateCameraDropdown();
  } else if (Array.isArray(m.cameraGroups) && m.cameraGroups.length === 0) {
    cameraGroups = [];
    const csel = document.getElementById('camera-sel');
    if (csel) csel.innerHTML = '';
  }
  if (m.telemetry) lastPluginTelemetry = m.telemetry;
  if (typeof m.lap === 'number' && !Number.isNaN(m.lap)) lastLap = m.lap;
  else lastLap = -1;
  if (m.frame !== undefined) setFrame(m.frame, m.frameEnd);
  updateReplaySessionRow(m);
}

function updateReplaySessionRow(m) {
  const row = document.getElementById('replay-session-row');
  if (!row) return;
  const mode = m.pluginMode || 'Unknown';
  const cnt = typeof m.replaySessionCount === 'number' ? m.replaySessionCount : 0;
  const show = mode === 'Replay' && cnt > 1;
  row.hidden = !show;
  if (!show) return;
  const num = typeof m.replaySessionNum === 'number' ? m.replaySessionNum : 0;
  const name = (m.replaySessionName && String(m.replaySessionName).trim() && m.replaySessionName !== '—')
    ? String(m.replaySessionName).trim()
    : 'Session';
  const idx = cnt > 0 ? Math.min(Math.max(num + 1, 1), cnt) : 1;
  const el = document.getElementById('replay-session-text');
  if (el) el.textContent = name + ' (' + idx + '/' + cnt + ')';
}

// ── Diag dots ────────────────────────────────────────────
function setDot(id, ok) {
  const el = document.getElementById(id);
  if (el) el.className = 'd-dot ' + (ok ? 'ok' : 'err');
}
function setWs(state) {
  const el = document.getElementById('ws-badge');
  el.className = 'ws-badge ' + state;
  el.textContent = state==='connected'?'WS ●':state==='connecting'?'WS …':'WS ○';
}

// ── Render incidents ─────────────────────────────────────
function getFilteredIncidents() {
  return incidents.filter(i => {
    if (incFilter === 'all') return true;
    if (incFilter === 'player') return i.player;
    return String(i.sev) === incFilter;
  });
}

/** Heuristic suggested camera group from incident cause + names from plugin (client-only until server emits field). */
function pickSuggestedCamera(inc) {
  if (!cameraGroups.length) return undefined;
  const names = cameraGroups.map(String);
  const pick = function (pred) {
    for (let i = 0; i < names.length; i++) if (pred(names[i])) return names[i];
    return null;
  };
  const c = String(inc.cause || '').toLowerCase();
  if (c.includes('contact') || c.includes('heavy')) return pick(function (n) { return /chase|tv|helicopter/i.test(n); }) || names[0];
  if (c.includes('wall') || c.includes('spin')) return pick(function (n) { return /helicopter|tv|tower/i.test(n); }) || names[0];
  if (c.includes('off') || c.includes('track')) return pick(function (n) { return /chase|cockpit/i.test(n); }) || names[0];
  return names[0];
}

function applySuggestedCamerasToIncidents() {
  if (!cameraGroups.length) return;
  for (let i = 0; i < incidents.length; i++) {
    if (!incidents[i].suggestedCamera) incidents[i].suggestedCamera = pickSuggestedCamera(incidents[i]);
  }
}

function incidentCardHtml(i) {
  const lapStr = (typeof i.lap === 'number' && i.lap >= 0) ? ` · L${i.lap}` : '';
  return `
    <div class="inc-card${i.player ? ' player' : ''}" data-frame="${i.frame}" role="button" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();onSessionIncidentClick(${i.frame})}" onclick="onSessionIncidentClick(${i.frame})">
      <span class="car-num">#${i.car}</span>
      <span class="inc-name">${i.driver}</span>
      <span class="cause-tag ${i.cause}">${i.cause.replace('-', ' ')}</span>
      <span class="sev-badge s${i.sev}">${i.sev}×</span>
      <span class="inc-time">${i.time}${lapStr}</span>
    </div>`;
}

function renderInc() {
  applySuggestedCamerasToIncidents();
  const filtered = getFilteredIncidents();
  const count = '(' + filtered.length + ')';
  const empty = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:18px 0">No incidents</div>';
  const html = !filtered.length ? empty : filtered.map(incidentCardHtml).join('');
  document.getElementById('inc-count').textContent = count;
  document.getElementById('inc-list').innerHTML = html;
  renderDriverIncidents();
  if (!incidents.length && incidentMetaSelection && incidentMetaSelection.kind === 'session') {
    incidentMetaSelection = null;
    collapseIncidentMetaStrip();
  } else {
    refreshIncidentMetaHighlight();
  }
  if (activeTab === 'leaderboard' && autoScroll) {
    const list = document.getElementById('inc-list');
    if (list) list.scrollTop = list.scrollHeight;
  }
}

function getSelectedCarNumber() {
  const sel = document.getElementById('car-sel');
  if (!sel) return 0;
  const opt = sel.options[sel.selectedIndex];
  if (!opt) return 0;
  return parseInt(opt.getAttribute('data-car') || '0', 10) || 0;
}

function renderDriverIncidents() {
  const el = document.getElementById('inc-list-driver');
  if (!el) return;
  const car = getSelectedCarNumber();
  const forCar = incidents.filter(i => i.car === car);
  const empty = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:12px 0">No incidents for this car</div>';
  el.innerHTML = !forCar.length ? empty : forCar.map(incidentCardHtml).join('');
  refreshIncidentMetaHighlight();
}

function populateCarDropdown(driversArr) {
  const sel = document.getElementById('car-sel');
  if (!sel || !Array.isArray(driversArr)) return;
  if (!driversArr.length) {
    sel.innerHTML = '';
    renderDriverIncidents();
    return;
  }
  const prevCar = getSelectedCarNumber();
  sel.innerHTML = driversArr.map(d =>
    `<option value="${d.carIdx}" data-car="${escapeHtmlForCaptured(String(d.carNum ?? ''))}"${d.isPlayer ? ' data-player="1"' : ''}>` +
    `#${escapeHtmlForCaptured(String(d.carNum ?? ''))} ${escapeHtmlForCaptured(String(d.name ?? ''))}${d.isPlayer ? ' (You)' : ''}</option>`
  ).join('');
  let restored = false;
  for (let i = 0; i < sel.options.length; i++) {
    const dc = sel.options[i].getAttribute('data-car');
    if (dc !== null && +dc === +prevCar) { sel.selectedIndex = i; restored = true; break; }
  }
  if (!restored) {
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].getAttribute('data-player') === '1') { sel.selectedIndex = i; break; }
    }
  }
  renderDriverIncidents();
}

function populateCameraDropdown() {
  const sel = document.getElementById('camera-sel');
  if (!sel) return;

function capturedRowHtml(rec) {

function renderCaptured() {
  const el = document.getElementById('captured-list');
  if (!el) return;
  if (!capturedIncidents.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:18px 0">No captured incidents yet. Run Find selected driver’s incidents or Find all incidents for all drivers.</div>';
    if (incidentMetaSelection && incidentMetaSelection.kind === 'capture') {
      incidentMetaSelection = null;
      collapseIncidentMetaStrip();
    } else {
      refreshIncidentMetaHighlight();
    }
    if (activeTab === 'captured' && autoScroll) el.scrollTop = 0;
    return;
  }
  const sorted = [...capturedIncidents].sort((a, b) => a.frame - b.frame || a.seq - b.seq);
  if (!capturedGroupByDriver) {
    el.innerHTML = sorted.map(capturedRowHtml).join('');
    refreshIncidentMetaHighlight();
    if (activeTab === 'captured' && autoScroll) el.scrollTop = el.scrollHeight;
    return;
  }
  const groups = new Map();
  for (const rec of sorted) {
    const key = `${rec.driver} (#${rec.car != null ? rec.car : '?'})`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(rec);
  }
  const keys = [...groups.keys()].sort((ka, kb) => {
    const fa = Math.min(...groups.get(ka).map(r => r.frame));
    const fb = Math.min(...groups.get(kb).map(r => r.frame));
    return fa - fb;
  });
  const keySet = new Set(keys);
  for (const k of [...capturedDriverGroupsCollapsed]) {
    if (!keySet.has(k)) capturedDriverGroupsCollapsed.delete(k);
  }
  let html = '';
  for (const k of keys) {
    const collapsed = capturedDriverGroupsCollapsed.has(k);
    const keyAttr = encodeURIComponent(k);
    const body = groups.get(k).map(capturedRowHtml).join('');
    html += `<div class="captured-group${collapsed ? ' collapsed' : ''}">`;
    html += `<div class="captured-group-hdr" data-group-key="${keyAttr}" role="button" tabindex="0" aria-expanded="${!collapsed}" onclick="toggleCapturedDriverGroup(event)" onkeydown="capturedGroupHdrKeydown(event)">`;
    html += `<span class="captured-group-chev" aria-hidden="true">${collapsed ? '▶' : '▼'}</span>`;
    html += `<span class="captured-group-title">${escapeHtmlForCaptured(k)}</span>`;
    html += '</div>';
    html += `<div class="captured-group-body">${body}</div>`;
    html += '</div>';
  }
  el.innerHTML = html;
  refreshIncidentMetaHighlight();
  if (activeTab === 'captured' && autoScroll) el.scrollTop = el.scrollHeight;
}

function escapeHtmlForCaptured(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function capturedGroupHdrKeydown(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    toggleCapturedDriverGroup(e);

}

function toggleCapturedDriverGroup(ev) {
  const hdr = ev.currentTarget;
  const raw = hdr.getAttribute('data-group-key');
  if (raw == null) return;
  let key;
  try {
    key = decodeURIComponent(raw);
  } catch {
    return;
  }
  if (!key) return;
  if (capturedDriverGroupsCollapsed.has(key)) capturedDriverGroupsCollapsed.delete(key);
  else capturedDriverGroupsCollapsed.add(key);
  const collapsed = capturedDriverGroupsCollapsed.has(key);
  const grp = hdr.closest('.captured-group');
  if (grp) grp.classList.toggle('collapsed', collapsed);
  hdr.setAttribute('aria-expanded', String(!collapsed));
  const chev = hdr.querySelector('.captured-group-chev');
  if (chev) chev.textContent = collapsed ? '▶' : '▼';
  sendDashboardUiEvent({
    element_id: 'captured-group-driver-accordion',
    event_type: 'ui_interaction',
    message: collapsed ? 'Captured driver group collapsed' : 'Captured driver group expanded',
    value: key
  });
}

function setTelem(t, b, sRad) {
  const tp = Math.round(t*100), bp = Math.round(b*100);

  document.getElementById('thr-pct').textContent  = tp+'%';
  document.getElementById('brk-bar').style.width = bp+'%';
  document.getElementById('brk-pct').textContent  = bp+'%';
  updateWheel(sRad);
}

function formatSteerDeviation(vd) {
  const a = Math.abs(vd);
  if (a < 0.05) return '0°';
  const mag = a < 10 ? String(+a.toFixed(1)).replace(/\.0$/, '') : String(Math.round(a));
  return vd > 0 ? mag + '° R' : mag + '° L';
}

function updateWheel(sRad) {
  const vd = Math.max(
    -STEER_AXIS_HALF_DEG,
    Math.min(STEER_AXIS_HALF_DEG, (sRad / STEER_MAX_RAD) * STEER_AXIS_HALF_DEG)
  );
  document.getElementById('g-needle').setAttribute('transform', `rotate(${vd},65,72)`);
  const arc = document.getElementById('g-active');
  arc.setAttribute('d', Math.abs(vd) < 0.5 ? '' : arcPath(65, 72, 55, 0, vd));
  document.getElementById('g-angle').textContent = formatSteerDeviation(vd);
}

// SVG arc helper: 0°=up, +ve=clockwise
function pxy(cx,cy,r,a) {
  const rad=(a-90)*Math.PI/180;
  return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)];
}
function arcPath(cx,cy,r,a0,a1) {
  const [sx,sy]=pxy(cx,cy,r,a0), [ex,ey]=pxy(cx,cy,r,a1);
  const d=a1-a0, large=Math.abs(d)>180?1:0, sweep=d>0?1:0;
  return `M ${sx.toFixed(2)},${sy.toFixed(2)} A ${r},${r} 0 ${large},${sweep} ${ex.toFixed(2)},${ey.toFixed(2)}`;
}

// ── Capture incidents ────────────────────────────────────
// Driver: seek each incident frame for the selected telemetry car only (from session list).
// Session: seek every incident frame for all drivers in the session; confirms before start.
const CAPTURE_STEP_MS = 600;
const CAPTURE_MAX_QUEUE = 200;

/** Wait until plugin state frame is near target (from WS state / setFrame), or timeout. */
function waitForFrameApprox(targetFrame, opts) {
  const tol = opts && opts.tolerance != null ? opts.tolerance : 120;
  const timeoutMs = opts && opts.timeoutMs != null ? opts.timeoutMs : 5000;
  const pollMs = opts && opts.pollMs != null ? opts.pollMs : 50;
  const start = Date.now();
  return new Promise(function (resolve) {
    function tick() {
      if (!capturing) {
        resolve({ ok: false, reason: 'stopped', frame: lastPluginFrame });
        return;
      }
      if (Math.abs(lastPluginFrame - targetFrame) <= tol) {
        resolve({ ok: true, frame: lastPluginFrame });
        return;
      }
      if (Date.now() - start >= timeoutMs) {
        resolve({ ok: false, reason: 'timeout', frame: lastPluginFrame });
        return;
      }
      setTimeout(tick, pollMs);
    }
    tick();
  });
}

let capturing = false;
let captureKind = 'driver';
let captureQueue = [];
let captureQueueIndex = 0;
let captureCount = 0;
let captureTimer = null;

function buildDriverCaptureQueue() {
  const car = getSelectedCarNumber();
  let frames = [...new Set(incidents.filter(i => i.car === car).map(i => i.frame))].sort((a, b) => a - b);
  if (frames.length > CAPTURE_MAX_QUEUE) frames = frames.slice(0, CAPTURE_MAX_QUEUE);
  return frames;
}

function buildSessionCaptureQueue() {
  let frames = [...new Set(incidents.map(i => i.frame))].sort((a, b) => a - b);
  if (frames.length > CAPTURE_MAX_QUEUE) frames = frames.slice(0, CAPTURE_MAX_QUEUE);
  return frames;
}

function selectCarInDropdownForFrame(frame) {
  const inc = incidents.find(i => i.frame === frame);
  if (!inc) return;
  const sel = document.getElementById('car-sel');
  if (!sel) return;
  const n = Number(inc.car);
  for (let i = 0; i < sel.options.length; i++) {
    if (+sel.options[i].getAttribute('data-car') === n) {
      sel.selectedIndex = i;
      break;
    }
  }
}

function toggleCaptureDriver() {
  if (capturing) {
    if (captureKind === 'driver') stopCapture();
    return;
  }
  startCaptureDriver();
}

function startCaptureDriver() {
  captureQueue = buildDriverCaptureQueue();
  if (!captureQueue.length) {
    toast('No incidents for the selected driver in the current session list.', undefined, 'walk-driver-empty');
    sendDashboardUiEvent({
      element_id: 'find-selected-driver-incidents',
      event_type: 'ui_interaction',
      message: 'Find selected driver’s incidents: empty queue',
      value: String(getSelectedCarNumber())
    });
    return;
  }
  captureKind = 'driver';
  capturing = true;
  captureCount = 0;
  captureQueueIndex = 0;
  setCaptureUI(true);
  sendDashboardUiEvent({
    element_id: 'find-selected-driver-incidents',
    event_type: 'click',
    message: 'Find selected driver’s incidents: scan started',
    value: String(captureQueue.length)
  });
  log('events', 'INFO ', 'capture_start', "driver scan  steps:" + captureQueue.length + '  step:' + CAPTURE_STEP_MS + 'ms');
  captureStep();
}

function startCaptureSessionClick() {
  if (capturing) {
    if (captureKind === 'session') stopCapture();
    return;
  }
  sendDashboardUiEvent({
    element_id: 'find-all-drivers-incidents',
    event_type: 'click',
    message: 'Find all incidents for all drivers: confirm shown'
  });
  const msg = 'This will seek through every incident for all drivers in the session, rotate the telemetry car to match each incident, and capture metadata for each. It may take a while. Are you sure?';
  if (!confirm(msg)) {
    sendDashboardUiEvent({
      element_id: 'find-all-drivers-incidents',
      event_type: 'ui_interaction',
      message: 'Find all incidents for all drivers: cancelled at confirm'
    });
    return;
  }
  startCaptureSession();
}

function startCaptureSession() {
  captureQueue = buildSessionCaptureQueue();
  if (!captureQueue.length) {
    toast('No incidents in the current session list.', undefined, 'walk-session-empty');
    sendDashboardUiEvent({
      element_id: 'find-all-drivers-incidents',
      event_type: 'ui_interaction',
      message: 'Find all incidents for all drivers: empty queue'
    });
    return;
  }
  captureKind = 'session';
  capturing = true;
  captureCount = 0;
  captureQueueIndex = 0;
  setCaptureUI(true);
  sendDashboardUiEvent({
    element_id: 'find-all-drivers-incidents',
    event_type: 'click',
    message: 'Find all incidents for all drivers: scan started',
    value: String(captureQueue.length)
  });
  log('events', 'INFO ', 'capture_start', 'session scan  steps:' + captureQueue.length + '  step:' + CAPTURE_STEP_MS + 'ms');
  captureStep();
}

function stopCapture() {
  capturing = false;
  clearTimeout(captureTimer);
  captureTimer = null;
  setCaptureUI(false);
  const elId = captureKind === 'session' ? 'find-all-drivers-incidents' : 'find-selected-driver-incidents';
  sendDashboardUiEvent({
    element_id: elId,
    event_type: 'click',
    message: (captureKind === 'session'
      ? 'Find all incidents for all drivers'
      : 'Find selected driver’s incidents') + ': scan stopped',
    value: String(captureCount)
  });
  log('events', 'INFO ', 'capture_end', 'Incident scan stopped  kind:' + captureKind + '  incidents_visited:' + captureCount);
}

function captureStep() {
  if (!capturing) return;
  if (captureQueueIndex >= captureQueue.length) {
    stopCapture();
    return;
  }

  const frame = captureQueue[captureQueueIndex++];
  captureCount++;
  if (captureKind === 'session') selectCarInDropdownForFrame(frame);
  const sent = send('seek_to_incident', String(frame));

  waitForFrameApprox(frame, { tolerance: 120, timeoutMs: 5000, pollMs: 40 }).then(function (res) {
    if (!capturing) return;
    const frameEl = document.getElementById('frame-cur').textContent;
    const timeEl = document.getElementById('session-time').textContent;
    const lapPart = (lastLap >= 0 ? '  lap:' + lastLap : '  lap:—');
    log('events', 'EVENT', 'capture_incident',
      '#' + String(captureCount).padStart(2, '0') + '  frame:' + frameEl.replace('Frame ', '') +
      '  session:' + timeEl + lapPart + (sent ? '' : '  [PoC-mock]') +
      (res.ok ? '' : '  handshake:' + (res.reason || 'miss')));

    const frameNum = res.ok ? res.frame : parseFrameFromLabel(frameEl);
    capturedIncidents.push(enrichCaptureRecord(frameNum, timeEl, captureCount));
    renderCaptured();

    const total = captureQueue.length;
    const prefix = captureKind === 'session' ? 'Session ' : 'Driver ';
    let status = prefix + captureCount + '/' + total + '…';
    if (!res.ok) status += ' (sync ' + (res.reason || 'miss') + ')';
    document.getElementById('cap-status').textContent = status;

    captureTimer = setTimeout(captureStep, CAPTURE_STEP_MS);
  });
}

function setCaptureUI(active) {
  const btnD = document.getElementById('cap-btn');
  const btnS = document.getElementById('cap-btn-session');
  const lbl = document.getElementById('cap-status');
  if (!btnD || !btnS || !lbl) return;
  btnD.classList.toggle('active', active && captureKind === 'driver');
  btnS.classList.toggle('active', active && captureKind === 'session');
  btnD.disabled = active && captureKind === 'session';
  btnS.disabled = active && captureKind === 'driver';
  btnD.textContent = active && captureKind === 'driver' ? 'Stop walk' : 'Walk this car’s listed incidents';
  btnS.textContent = active && captureKind === 'session' ? 'Stop walk' : 'Walk all listed incidents (session)';
  lbl.className = 'cap-status' + (active ? ' running' : '');
  if (!active) {
    lbl.textContent = captureCount ? 'Done (' + captureCount + ' found)' : '—';
    btnD.disabled = false;
    btnS.disabled = false;
  }
}

function scrubClick(e) {
  const pct = Math.round((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth * 100);
  sendDashboardUiEvent({
    element_id: 'replay-scrub',
    event_type: 'click',
    message: 'Replay scrub bar click',
    value: String(pct)
  });
  toast('[PoC] Scrub to ' + pct + '%', undefined, 'replay-scrub');
}
function setFrame(cur, end) {
  if (cur !== undefined) {
    lastPluginFrame = cur;
    document.getElementById('frame-cur').textContent = 'Frame ' + cur.toLocaleString();
  }
  if (end !== undefined) document.getElementById('frame-end').textContent = '/ ' + end.toLocaleString();
  if (cur !== undefined && end && end > 0)
    document.getElementById('scrub-fill').style.width = (cur/end*100).toFixed(1)+'%';
}

// ── Logs ─────────────────────────────────────────────────
function log(tab, level, event, message) {
  const pane = document.getElementById('log-' + tab);
  if (!pane) return;
  const l = level.trim();
  const cls = l==='WARN'||l==='ERROR' ? l.toLowerCase() : l==='EVENT' ? 'event' : l==='DATA' ? 'data' : 'info';
  const ts = new Date().toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'll ' + cls;
  div.textContent = '['+ts+'] '+level.padEnd(5)+' '+event.padEnd(22)+' '+message;
  pane.appendChild(div);
  while (pane.childElementCount > LOG_MAX) pane.removeChild(pane.firstChild);
  if (autoScroll && tab === activeTab) pane.scrollTop = pane.scrollHeight;
}

function switchTab(el) {
  activeTab = el.dataset.tab;
  sendDashboardUiEvent({
    element_id: 'log-tab-' + activeTab,
    event_type: 'click',
    message: 'Log tab: ' + (el.textContent || '').trim()
  });
  document.querySelectorAll('.log-tab').forEach(t => t.classList.toggle('active', t===el));
  document.querySelectorAll('.log-pane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('log-' + activeTab);
  if (pane) { pane.classList.add('active'); if (autoScroll) pane.scrollTop = pane.scrollHeight; }
}

function toggleAS() {
  autoScroll = !autoScroll;
  document.getElementById('asbtn').classList.toggle('on', autoScroll);
  sendDashboardUiEvent({
    element_id: 'log-autoscroll',
    event_type: 'click',
    message: autoScroll ? 'Log autoscroll on' : 'Log autoscroll off',
    value: autoScroll ? 'on' : 'off'
  });
}

function fmtTelem(m) {
  return `Throttle:${(m.throttle||0).toFixed(2)}  Brake:${(m.brake||0).toFixed(2)}  Steer:${(m.steeringAngle||0).toFixed(3)}rad  Speed:${(m.speed||0).toFixed(1)}mph`;
}

// ── Toast ────────────────────────────────────────────────
/** Suppress repeat toasts for the same control within this window; a different debounceKey always shows. */
const TOAST_DEBOUNCE_MS = 800;
let lastToastDebounceKey = null;
let lastToastDebounceAt = 0;
let toastT = null;
function toast(msg, durationMs, debounceKey) {
  const now = Date.now();
  if (debounceKey != null && debounceKey !== '') {
    if (debounceKey === lastToastDebounceKey && (now - lastToastDebounceAt) < TOAST_DEBOUNCE_MS) return;
    lastToastDebounceKey = debounceKey;
    lastToastDebounceAt = now;
  }
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), durationMs != null ? durationMs : 2600);
}

// ── Mock animation ───────────────────────────────────────
function mockTick() {
  if (mockPaused) return;
  mockTime += 0.05;
  const t = Math.max(0, Math.min(1, 0.6 + 0.35*Math.sin(mockTime*0.7)));
  const b = Math.max(0, Math.min(1, Math.max(0, -Math.sin(mockTime*0.7+Math.PI))*0.8));
  const s = 3.5*Math.sin(mockTime*0.4);
  setTelem(t, b, s);
  const pct = (38 + 18*Math.sin(mockTime*0.04)).toFixed(1);
  document.getElementById('scrub-fill').style.width = pct + '%';
  const frame = Math.round(21000 + 4000*Math.sin(mockTime*0.04));
  document.getElementById('frame-cur').textContent = 'Frame ' + frame.toLocaleString();
  // Emit mock telemetry log line occasionally
  if (Math.round(mockTime*20)%40 === 0) {
    log('telem','DATA ','telemetry', `Throttle:${t.toFixed(2)}  Brake:${b.toFixed(2)}  Steer:${s.toFixed(3)}rad`);
  }
}

// ── Init ─────────────────────────────────────────────────
function init() {
  populateCarDropdown(MOCK_DRV.map((d, ix) => ({
    carIdx: ix,
    carNum: String(d.car),
    name: d.name,
    isPlayer: !!d.player
  })));

  renderStd();

}

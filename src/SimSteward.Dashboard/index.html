<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sim Steward</title>
<style>
:root {
  --bg: #080808; --bg2: #0e0e0e;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --accent: #1f9cff; --green: #0ef272;
  --red: #ff5f5f; --yellow: #ffc840; --cyan: #0dd8ff;
  --text: #f0f0f0; --muted: rgba(240,240,240,0.4);
  --r: 10px;
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

.app { height: 100vh; display: flex; flex-direction: column; gap: 8px; padding: 8px; }

/* ── Status bar ── */
.status-bar {
  flex-shrink: 0; display: flex; align-items: center; gap: 12px;
  padding: 7px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r);
}
.mode-pill {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 99px; font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid currentColor;
}
.mode-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.mode-pill.live    { color: var(--green); background: rgba(14,242,114,0.07); }
.mode-pill.replay  { color: var(--accent); background: rgba(31,156,255,0.07); }
.mode-pill.waiting { color: var(--muted); background: transparent; }
.session-time { font-family: "Courier New", monospace; font-size: 0.95rem; }
.sb-spacer { flex: 1; }
.diag-row { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: var(--muted); }
.diag-item { display: flex; align-items: center; gap: 4px; }
.d-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.12); }
.d-dot.ok   { background: var(--green); box-shadow: 0 0 4px rgba(14,242,114,0.5); }
.d-dot.err  { background: var(--red); }
.d-dot.warn { background: var(--yellow); }
.ws-badge {
  font-size: 0.68rem; padding: 2px 8px; border-radius: 99px; border: 1px solid; cursor: default;
}
.ws-badge.connected    { color: var(--green);  border-color: rgba(14,242,114,0.3); background: rgba(14,242,114,0.07); }
.ws-badge.disconnected { color: var(--red);    border-color: rgba(255,95,95,0.3);  background: rgba(255,95,95,0.07); }
.ws-badge.connecting   { color: var(--yellow); border-color: rgba(255,200,64,0.3); background: rgba(255,200,64,0.07); }

/* ── Main grid ── */
.main-grid {
  flex: 1; display: grid; grid-template-columns: 300px 1fr;
  gap: 8px; min-height: 0; overflow: hidden;
}
.left-col {
  display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.right-col { display: flex; flex-direction: column; gap: 8px; min-height: 0; overflow: hidden; }

/* ── Panel ── */
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; flex-shrink: 0; }
.panel-title { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }

/* ── Replay ── */
.btn-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 10px; }
.btn {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px;
  background: rgba(255,255,255,0.03); color: var(--text); font-size: 1rem;
  cursor: pointer; transition: border-color 0.15s, background 0.15s; line-height: 1; min-width: 36px; text-align: center;
}
.btn:hover  { border-color: var(--accent); background: rgba(31,156,255,0.1); }
.btn:active { transform: scale(0.96); }
.speed-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.spill {
  flex: 1; padding: 4px 4px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--muted); font-size: 0.7rem;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.spill:hover { border-color: var(--accent); color: var(--text); }
.spill.active { border-color: var(--accent); background: rgba(31,156,255,0.15); color: var(--accent); }
.scrub-row { display: flex; flex-direction: column; gap: 4px; }
.scrub-labels { display: flex; justify-content: space-between; font-size: 0.67rem; color: var(--muted); }
.scrub-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; cursor: pointer; }
.scrub-fill { height: 100%; width: 38%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 4px; transition: width 0.2s; }
.panel-sub {
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
}
.panel-sub-title {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.panel-sub .car-sel { margin-bottom: 0; }
.cap-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.btn.cap { font-size: 0.8rem; padding: 7px 14px; flex-shrink: 0; border-color: var(--accent); color: var(--accent); background: rgba(31,156,255,0.07); }
.btn.cap.btn-scan {
  flex: 1;
  min-width: 0;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: normal;
  line-height: 1.25;
  padding: 8px 10px;
  text-align: center;
}
.btn.cap:hover { background: rgba(31,156,255,0.16); }
.btn.cap.active { border-color: var(--red); color: var(--red); background: rgba(255,95,95,0.07); animation: cap-pulse 1.2s ease-in-out infinite; }
.cap-status { font-size: 0.7rem; color: var(--muted); }
.cap-status.running { color: var(--accent); }
@keyframes cap-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

/* ── Telemetry ── */
.car-sel {
  width: 100%; padding: 5px 8px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  font-size: 0.82rem; margin-bottom: 10px; cursor: pointer;
}
.input-rows { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.input-lbl { display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); margin-bottom: 3px; }
.bar-track { height: 10px; background: rgba(255,255,255,0.06); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.08s ease; }
.bar-fill.thr { background: linear-gradient(90deg, #0a7a35, var(--green)); }
.bar-fill.brk { background: linear-gradient(90deg, #7a0a0a, var(--red)); }
.steer-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.steer-lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
.steer-svg { width: 100%; max-width: 210px; }
.g-track  { stroke: rgba(255,255,255,0.09); stroke-width: 5; fill: none; stroke-linecap: round; }
.g-active { stroke: var(--accent); stroke-width: 5; fill: none; stroke-linecap: round; }
.g-ctick  { stroke: rgba(255,255,255,0.35); stroke-width: 1.5; }
.g-needle { stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }
.g-hub    { fill: var(--accent); }
.g-text   { fill: rgba(240,240,240,0.4); font-size: 8px; font-family: "Courier New", monospace; }
.g-angle  { fill: rgba(240,240,240,0.6); font-size: 9px; font-family: "Courier New", monospace; }

/* ── Incidents panel ── */
.incidents-panel { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.inc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
.chips { display: flex; gap: 4px; }
.chip {
  padding: 2px 9px; border: 1px solid var(--border); border-radius: 99px;
  font-size: 0.68rem; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.chip:hover  { border-color: var(--accent); color: var(--text); }
.chip.active { border-color: var(--accent); background: rgba(31,156,255,0.12); color: var(--accent); }
.inc-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.inc-card {
  display: grid; grid-template-columns: 2.4rem 1fr auto auto auto;
  align-items: center; gap: 8px; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: 8px;
  background: rgba(255,255,255,0.02); cursor: pointer; flex-shrink: 0;
  transition: background 0.12s, border-color 0.12s;
}
.inc-card:hover  { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); }
.inc-card.player { border-left: 3px solid var(--accent); background: rgba(31,156,255,0.04); }
.car-num { font-family: "Courier New", monospace; font-size: 0.7rem; text-align: center; background: rgba(255,255,255,0.07); border-radius: 4px; padding: 2px 4px; color: var(--muted); }
.inc-name { font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inc-time { font-family: "Courier New", monospace; font-size: 0.7rem; color: var(--muted); }
.sev-badge { font-family: "Courier New", monospace; font-size: 0.7rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; min-width: 26px; text-align: center; }
.sev-badge.s1 { background: rgba(14,242,114,0.12);  color: var(--green); }
.sev-badge.s2 { background: rgba(255,200,64,0.12);  color: var(--yellow); }
.sev-badge.s4 { background: rgba(255,95,95,0.12);   color: var(--red); }
.cause-tag { font-size: 0.63rem; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.cause-tag.off-track { background: rgba(14,242,114,0.1);  color: var(--green); }
.cause-tag.wall      { background: rgba(255,200,64,0.1);  color: var(--yellow); }
.cause-tag.spin      { background: rgba(255,200,64,0.1);  color: var(--yellow); }
.cause-tag.contact   { background: rgba(255,95,95,0.1);   color: var(--red); }

/* ── Standings ── */
.std-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.std-header:hover .chev { color: var(--text); }
.chev { color: var(--muted); font-size: 0.7rem; transition: transform 0.15s, color 0.15s; }
.standings-panel.open .chev { transform: rotate(180deg); }
.std-body { margin-top: 8px; }
.standings-panel:not(.open) .std-body { display: none; }
.std-row { display: grid; grid-template-columns: 1.6rem 2.2rem 1fr auto; gap: 8px; align-items: center; padding: 5px 6px; border-radius: 6px; font-size: 0.82rem; transition: background 0.1s; }
.std-row:hover         { background: rgba(255,255,255,0.03); }
.std-row.player        { background: rgba(31,156,255,0.06); }
.std-row.hdr           { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; }
.std-pos               { color: var(--muted); font-size: 0.7rem; }
.std-inc               { font-family: "Courier New", monospace; font-weight: 600; text-align: right; }
.std-inc.zero          { color: var(--muted); }
.std-inc.low           { color: var(--green); }
.std-inc.mid           { color: var(--yellow); }
.std-inc.high          { color: var(--red); }

/* ── Log section ── */
.log-section {
  flex-shrink: 0; height: 188px; display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.log-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.log-tab {
  padding: 7px 14px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); cursor: pointer; border: none; border-bottom: 2px solid transparent;
  background: transparent; transition: color 0.15s, border-color 0.15s; user-select: none;
}
.log-tab:hover  { color: var(--text); }
.log-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.log-autoscroll {
  margin-left: auto; display: flex; align-items: center; gap: 4px;
  padding: 0 12px; font-size: 0.67rem; color: var(--muted); cursor: pointer; user-select: none; border: none; background: transparent;
}
.log-autoscroll.on { color: var(--accent); }
.log-pane {
  flex: 1; overflow-y: auto; padding: 5px 10px; font-family: "Courier New", monospace;
  font-size: 0.73rem; line-height: 1.55; display: none;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.log-pane.active { display: block; }
.ll { white-space: pre; }
.ll.info  { color: rgba(240,240,240,0.55); }
.ll.warn  { color: var(--yellow); }
.ll.error { color: var(--red); }
.ll.event { color: var(--cyan); }
.ll.debug { color: rgba(240,240,240,0.25); }
.ll.data  { color: rgba(13,216,255,0.7); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 18px; right: 18px; padding: 9px 15px;
  background: rgba(18,18,22,0.97); border: 1px solid var(--border); border-radius: 8px;
  font-size: 0.8rem; color: var(--text); opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Status bar ── -->
  <header class="status-bar">
    <div class="mode-pill waiting" id="mode-pill"><span class="dot"></span><span id="mode-text">WAITING</span></div>
    <span class="session-time" id="session-time">—:——</span>
    <div class="sb-spacer"></div>
    <div class="diag-row">
      <span class="diag-item"><span class="d-dot" id="d-irsdk"></span>iRacing</span>
      <span class="diag-item"><span class="d-dot" id="d-steam"></span>Steam</span>
      <span class="diag-item"><span class="d-dot" id="d-simhub"></span>SimHub</span>
    </div>
    <span class="ws-badge disconnected" id="ws-badge">WS ○</span>
  </header>

  <!-- ── Main grid ── -->
  <div class="main-grid">

    <!-- Left column -->
    <div class="left-col">

      <!-- Replay controls -->
      <div class="panel">
        <div class="panel-title">Replay Controls</div>
        <div class="btn-row">
          <button class="btn" title="Jump to start"    onclick="ra('replay_jump','start')">⏮</button>
          <button class="btn" title="Rewind 4×"        onclick="ra('replay_speed','-4')">⏪</button>
          <button class="btn" title="Prev incident"    onclick="ra('replay_seek','prev')">◀</button>
          <button class="btn" title="Next incident"    onclick="ra('replay_seek','next')">▶</button>
          <button class="btn" title="Forward 4×"       onclick="ra('replay_speed','4')">⏩</button>
          <button class="btn" title="Jump to end"      onclick="ra('replay_jump','end')">⏭</button>
        </div>
        <div class="speed-pills" id="speed-pills">
          <button class="spill" data-s="0.25" onclick="setSpeed(this)">0.25×</button>
          <button class="spill" data-s="0.5"  onclick="setSpeed(this)">0.5×</button>
          <button class="spill active" data-s="1" onclick="setSpeed(this)">1×</button>
          <button class="spill" data-s="2"  onclick="setSpeed(this)">2×</button>
          <button class="spill" data-s="4"  onclick="setSpeed(this)">4×</button>
          <button class="spill" data-s="8"  onclick="setSpeed(this)">8×</button>
          <button class="spill" data-s="16" onclick="setSpeed(this)">16×</button>
        </div>
        <div class="scrub-row">
          <div class="scrub-labels">
            <span id="frame-cur">Frame 21,234</span>
            <span id="frame-end">/ 55,000</span>
          </div>
          <div class="scrub-track" onclick="scrubClick(event)">
            <div class="scrub-fill" id="scrub-fill"></div>
          </div>
        </div>
      </div>

      <!-- Incident navigation -->
      <div class="panel">
        <div class="panel-title">Incident navigation</div>
        <div class="panel-sub">
          <div class="panel-sub-title">Telemetry car</div>
          <select class="car-sel" id="car-sel" onchange="onCarSel()" title="Driver whose throttle, brake, and steering are shown below">
            <option value="0">#99 J. Smith (You)</option>
            <option value="1">#12 A. Jones</option>
            <option value="2">#42 B. Lee</option>
            <option value="3">#7 M. Wilson</option>
          </select>
        </div>
        <div class="btn-row">
          <button class="btn" title="Previous incident in replay" onclick="ra('replay_seek','prev')">◀</button>
          <button class="btn" title="Next incident in replay"     onclick="ra('replay_seek','next')">▶</button>
        </div>
        <div class="cap-row">
          <button type="button" class="btn cap btn-scan" id="cap-btn" onclick="toggleCapture()"
            title="Step through incidents and log each position (stops after 50 or when you stop)">Find all incidents</button>
          <span class="cap-status" id="cap-status">—</span>
        </div>
      </div>

      <!-- Telemetry -->
      <div class="panel">
        <div class="panel-title">Telemetry</div>
        <div class="input-rows">
          <div>
            <div class="input-lbl"><span>Throttle</span><span id="thr-pct">65%</span></div>
            <div class="bar-track"><div class="bar-fill thr" id="thr-bar" style="width:65%"></div></div>
          </div>
          <div>
            <div class="input-lbl"><span>Brake</span><span id="brk-pct">0%</span></div>
            <div class="bar-track"><div class="bar-fill brk" id="brk-bar" style="width:0%"></div></div>
          </div>
        </div>
        <div class="steer-wrap">
          <span class="steer-lbl">Steering</span>
          <!-- viewBox: 130×80, gauge center (65, 72), radius 55 -->
          <!-- Track: left (10,72) through top (65,17) to right (120,72), sweep=1 -->
          <svg class="steer-svg" viewBox="0 0 130 80">
            <path class="g-track" d="M 10,72 A 55,55 0 0,1 120,72"/>
            <path class="g-active" id="g-active" d=""/>
            <line class="g-ctick" x1="65" y1="17" x2="65" y2="25"/>
            <line class="g-needle" id="g-needle" x1="65" y1="72" x2="65" y2="22"/>
            <circle class="g-hub" cx="65" cy="72" r="4.5"/>
            <text class="g-text" x="4"  y="76">L</text>
            <text class="g-text" x="118" y="76">R</text>
            <text class="g-angle" id="g-angle" text-anchor="middle" x="65" y="62">0°</text>
          </svg>
        </div>
      </div>

    </div><!-- /left-col -->

    <!-- Right column -->
    <div class="right-col">

      <!-- Incidents -->
      <div class="panel incidents-panel">
        <div class="inc-header">
          <span class="panel-title" style="margin-bottom:0">
            Incidents <span id="inc-count" style="color:var(--muted)">(5)</span>
          </span>
          <div class="chips">
            <span class="chip active" data-f="all"    onclick="setFilter(this)">All</span>
            <span class="chip"        data-f="1"      onclick="setFilter(this)">1×</span>
            <span class="chip"        data-f="2"      onclick="setFilter(this)">2×</span>
            <span class="chip"        data-f="4"      onclick="setFilter(this)">4×</span>
            <span class="chip"        data-f="player" onclick="setFilter(this)">Mine</span>
          </div>
        </div>
        <div class="inc-list" id="inc-list"></div>
      </div>

      <!-- Standings -->
      <div class="panel standings-panel open" id="std-panel">
        <div class="std-header" onclick="toggleStd()">
          <span class="panel-title" style="margin-bottom:0">Driver Standings</span>
          <span class="chev">▼</span>
        </div>
        <div class="std-body">
          <div class="std-row hdr"><span>#</span><span>Car</span><span>Driver</span><span>Inc</span></div>
          <div id="std-list"></div>
        </div>
      </div>

    </div><!-- /right-col -->
  </div><!-- /main-grid -->

  <!-- ── Log section ── -->
  <section class="log-section">
    <div class="log-tabs">
      <button class="log-tab active" data-tab="events"   onclick="switchTab(this)">iRacing Events</button>
      <button class="log-tab"        data-tab="health"   onclick="switchTab(this)">App Health</button>
      <button class="log-tab"        data-tab="telem"    onclick="switchTab(this)">Telemetry Data</button>
      <button class="log-autoscroll on" id="asbtn" onclick="toggleAS()">⬇ Auto</button>
    </div>
    <div class="log-pane active" id="log-events"></div>
    <div class="log-pane"        id="log-health"></div>
    <div class="log-pane"        id="log-telem"></div>
  </section>

</div><!-- /app -->
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────
const WS_URL         = 'ws://localhost:19847';
const LOG_MAX        = 500;
const STEER_MAX_RAD  = 7.0;
const STEER_VIS_MAX  = 88;   // ±degrees visual

// ── Mock data ────────────────────────────────────────────
const MOCK_INC = [
  { id:1, time:'12:34.5', car:99, driver:'J. Smith',  sev:4, cause:'contact',  frame:54321, player:true  },
  { id:2, time:'12:20.1', car:12, driver:'A. Jones',  sev:2, cause:'wall',     frame:52100, player:false },
  { id:3, time:'11:45.8', car:42, driver:'B. Lee',    sev:1, cause:'off-track',frame:48900, player:false },
  { id:4, time:'11:12.3', car:7,  driver:'M. Wilson', sev:4, cause:'contact',  frame:45200, player:false },
  { id:5, time:'10:55.0', car:99, driver:'J. Smith',  sev:2, cause:'spin',     frame:44100, player:true  },
];
const MOCK_DRV = [
  { pos:1, car:99, name:'J. Smith',  inc:6, player:true  },
  { pos:2, car:7,  name:'M. Wilson', inc:4, player:false },
  { pos:3, car:12, name:'A. Jones',  inc:2, player:false },
  { pos:4, car:42, name:'B. Lee',    inc:1, player:false },
];
const MOCK_CAR_TELEM = [
  { t:0.65, b:0.00, s: 0.30 },
  { t:0.90, b:0.00, s:-1.20 },
  { t:0.00, b:0.75, s: 2.10 },
  { t:0.45, b:0.00, s:-3.50 },
];

// ── State ────────────────────────────────────────────────
let incidents   = [...MOCK_INC];
let drivers     = [...MOCK_DRV];
let incFilter   = 'all';
let autoScroll  = true;
let activeTab   = 'events';
let ws          = null;
let mockTime    = 0;
let mockPaused  = false;  // paused when real WS connected
let mockTelem   = { t:0.65, b:0.00, s:0.30 };

// ── WebSocket ────────────────────────────────────────────
function connectWs() {
  try {
    setWs('connecting');
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      setWs('connected');
      mockPaused = true;
      log('health','INFO ','ws_connected','WebSocket connected to plugin at ' + WS_URL);
    };
    ws.onclose = () => {
      ws = null; mockPaused = false;
      setWs('disconnected');
      log('health','WARN ','ws_closed','Connection lost — retrying in 3 s');
      setTimeout(connectWs, 3000);
    };
    ws.onerror = () => { ws = null; mockPaused = false; };
    ws.onmessage = e => { try { onMsg(JSON.parse(e.data)); } catch {} };
  } catch {
    setWs('disconnected');
    setTimeout(connectWs, 3000);
  }
}

function send(action, arg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return false;
  ws.send(JSON.stringify({ action, arg: arg ?? '' }));
  return true;
}

function onMsg(m) {
  if (!m || !m.type) return;
  if (m.type === 'state')         onState(m);
  else if (m.type === 'logEvents')  (m.entries || []).forEach(e => log('health', (e.level||'INFO').toUpperCase().padEnd(5), e.event||'', e.message||''));
  else if (m.type === 'incidents')  { incidents = m.entries || []; renderInc(); }
  else if (m.type === 'iracingEvent') log('events','EVENT', m.event||'event', m.data||JSON.stringify(m));
  else if (m.type === 'telemetryData') log('telem','DATA ', 'telemetry', fmtTelem(m));
  else if (m.type === 'pong') {}
}

// ── State update ─────────────────────────────────────────
function onState(m) {
  const mode = m.pluginMode || 'Unknown';
  const pill = document.getElementById('mode-pill');
  pill.className = 'mode-pill ' + (mode==='Live'?'live':mode==='Replay'?'replay':'waiting');
  document.getElementById('mode-text').textContent = mode.toUpperCase();
  document.getElementById('session-time').textContent = m.currentSessionTimeFormatted || '—:——';
  const d = m.diagnostics || {};
  setDot('d-irsdk',  d.irsdkConnected);
  setDot('d-steam',  d.steamRunning);
  setDot('d-simhub', d.simHubHttpListening);
  if (m.telemetry) setTelem(m.telemetry.throttle||0, m.telemetry.brake||0, m.telemetry.steeringWheelAngle||0);
  if (m.drivers)   { drivers = m.drivers; renderStd(); }
  if (m.frame !== undefined) setFrame(m.frame, m.frameEnd);
}

// ── Diag dots ────────────────────────────────────────────
function setDot(id, ok) {
  const el = document.getElementById(id);
  if (el) el.className = 'd-dot ' + (ok ? 'ok' : 'err');
}
function setWs(state) {
  const el = document.getElementById('ws-badge');
  el.className = 'ws-badge ' + state;
  el.textContent = state==='connected'?'WS ●':state==='connecting'?'WS …':'WS ○';
}

// ── Render incidents ─────────────────────────────────────
function renderInc() {
  const list = document.getElementById('inc-list');
  const filtered = incidents.filter(i => {
    if (incFilter === 'all')    return true;
    if (incFilter === 'player') return i.player;
    return String(i.sev) === incFilter;
  });
  document.getElementById('inc-count').textContent = '(' + filtered.length + ')';
  if (!filtered.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.82rem;text-align:center;padding:18px 0">No incidents</div>';
    return;
  }
  list.innerHTML = filtered.map(i => `
    <div class="inc-card${i.player?' player':''}" onclick="seekInc(${i.frame})">
      <span class="car-num">#${i.car}</span>
      <span class="inc-name">${i.driver}</span>
      <span class="cause-tag ${i.cause}">${i.cause.replace('-',' ')}</span>
      <span class="sev-badge s${i.sev}">${i.sev}×</span>
      <span class="inc-time">${i.time}</span>
    </div>`).join('');
}

function setFilter(el) {
  incFilter = el.dataset.f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderInc();
}

// ── Render standings ─────────────────────────────────────
function renderStd() {
  document.getElementById('std-list').innerHTML = drivers.map(d => {
    const cls = d.inc===0?'zero':d.inc<=2?'low':d.inc<=4?'mid':'high';
    return `<div class="std-row${d.player?' player':''}">
      <span class="std-pos">${d.pos}</span>
      <span class="car-num">#${d.car}</span>
      <span>${d.name}</span>
      <span class="std-inc ${cls}">${d.inc}x</span>
    </div>`;
  }).join('');
}
function toggleStd() { document.getElementById('std-panel').classList.toggle('open'); }

// ── Telemetry ────────────────────────────────────────────
function setTelem(t, b, sRad) {
  const tp = Math.round(t*100), bp = Math.round(b*100);
  document.getElementById('thr-bar').style.width = tp+'%';
  document.getElementById('thr-pct').textContent  = tp+'%';
  document.getElementById('brk-bar').style.width = bp+'%';
  document.getElementById('brk-pct').textContent  = bp+'%';
  updateWheel(sRad);
}

function updateWheel(sRad) {
  const vd = Math.max(-STEER_VIS_MAX, Math.min(STEER_VIS_MAX, (sRad/STEER_MAX_RAD)*STEER_VIS_MAX));
  document.getElementById('g-needle').setAttribute('transform', `rotate(${vd},65,72)`);
  const arc = document.getElementById('g-active');
  arc.setAttribute('d', Math.abs(vd) < 1 ? '' : arcPath(65,72,55,0,vd));
  const deg = Math.round(sRad*(180/Math.PI));
  document.getElementById('g-angle').textContent = deg + '°';
}

// SVG arc helper: 0°=up, +ve=clockwise
function pxy(cx,cy,r,a) {
  const rad=(a-90)*Math.PI/180;
  return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)];
}
function arcPath(cx,cy,r,a0,a1) {
  const [sx,sy]=pxy(cx,cy,r,a0), [ex,ey]=pxy(cx,cy,r,a1);
  const d=a1-a0, large=Math.abs(d)>180?1:0, sweep=d>0?1:0;
  return `M ${sx.toFixed(2)},${sy.toFixed(2)} A ${r},${r} 0 ${large},${sweep} ${ex.toFixed(2)},${ey.toFixed(2)}`;
}

function onCarSel() {
  const idx = +document.getElementById('car-sel').value;
  const m = MOCK_CAR_TELEM[idx] || MOCK_CAR_TELEM[0];
  mockTelem = m;
  setTelem(m.t, m.b, m.s);
}

// ── Replay ───────────────────────────────────────────────
function ra(action, arg) {
  if (!send(action, arg)) toast('[PoC] ' + action + ' ' + arg + ' — not yet wired');
  log('events','INFO ','replay_action', action + ' arg=' + arg);
}
function setSpeed(el) {
  document.querySelectorAll('.spill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  ra('replay_speed', el.dataset.s);
}
function seekInc(frame) {
  if (!send('seek_to_incident', String(frame))) toast('[PoC] Seek to frame ' + frame);
  log('events','INFO ','seek_requested','frame=' + frame);
}
// ── Capture incidents ────────────────────────────────────
// Loops "next incident" hotkey rapidly to collect per-incident metadata.
// Each iteration: send seek-next, wait CAPTURE_STEP_MS, record state snapshot.
// Stops after CAPTURE_MAX steps or when user clicks Stop.
const CAPTURE_STEP_MS = 600;
const CAPTURE_MAX     = 50;

let capturing    = false;
let captureCount = 0;
let captureTimer = null;

function toggleCapture() {
  if (capturing) stopCapture();
  else startCapture();
}

function startCapture() {
  capturing    = true;
  captureCount = 0;
  setCaptureUI(true);
  log('events','INFO ','capture_start','Find-all-incidents scan started  max:' + CAPTURE_MAX + '  step:' + CAPTURE_STEP_MS + 'ms');
  captureStep();
}

function stopCapture() {
  capturing = false;
  clearTimeout(captureTimer);
  setCaptureUI(false);
  log('events','INFO ','capture_end','Incident scan stopped  incidents_visited:' + captureCount);
}

function captureStep() {
  if (!capturing) return;
  if (captureCount >= CAPTURE_MAX) { stopCapture(); return; }

  captureCount++;

  // Send "next incident" action — plugin advances replay to the next incident frame.
  // When the plugin implements replay_seek/next it will respond with updated state
  // (frame number, session time) which we capture as the incident metadata.
  const sent = send('replay_seek', 'next');
  const ts   = new Date().toTimeString().slice(0,8);

  // Record current known state as the metadata snapshot for this incident.
  // In live wiring, onState() will fire after the seek with the actual frame data.
  const frameEl = document.getElementById('frame-cur').textContent;
  const timeEl  = document.getElementById('session-time').textContent;
  log('events','EVENT','capture_incident',
    '#' + String(captureCount).padStart(2,'0') + '  frame:' + frameEl.replace('Frame ','') +
    '  session:' + timeEl + (sent ? '' : '  [PoC-mock]'));

  document.getElementById('cap-status').textContent = 'Found ' + captureCount + '…';
  captureTimer = setTimeout(captureStep, CAPTURE_STEP_MS);
}

function setCaptureUI(active) {
  const btn = document.getElementById('cap-btn');
  const lbl = document.getElementById('cap-status');
  btn.classList.toggle('active', active);
  btn.textContent = active ? 'Stop scan' : 'Find all incidents';
  lbl.className   = 'cap-status' + (active ? ' running' : '');
  if (!active) lbl.textContent = captureCount ? 'Done (' + captureCount + ' found)' : '—';
}

function scrubClick(e) {
  const pct = Math.round((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth * 100);
  toast('[PoC] Scrub to ' + pct + '%');
}
function setFrame(cur, end) {
  if (cur !== undefined) document.getElementById('frame-cur').textContent = 'Frame ' + cur.toLocaleString();
  if (end !== undefined) document.getElementById('frame-end').textContent = '/ ' + end.toLocaleString();
  if (cur !== undefined && end && end > 0)
    document.getElementById('scrub-fill').style.width = (cur/end*100).toFixed(1)+'%';
}

// ── Logs ─────────────────────────────────────────────────
function log(tab, level, event, message) {
  const pane = document.getElementById('log-' + tab);
  if (!pane) return;
  const l = level.trim();
  const cls = l==='WARN'||l==='ERROR' ? l.toLowerCase() : l==='EVENT' ? 'event' : l==='DATA' ? 'data' : 'info';
  const ts = new Date().toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'll ' + cls;
  div.textContent = '['+ts+'] '+level.padEnd(5)+' '+event.padEnd(22)+' '+message;
  pane.appendChild(div);
  while (pane.childElementCount > LOG_MAX) pane.removeChild(pane.firstChild);
  if (autoScroll && tab === activeTab) pane.scrollTop = pane.scrollHeight;
}

function switchTab(el) {
  activeTab = el.dataset.tab;
  document.querySelectorAll('.log-tab').forEach(t => t.classList.toggle('active', t===el));
  document.querySelectorAll('.log-pane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('log-' + activeTab);
  if (pane) { pane.classList.add('active'); if (autoScroll) pane.scrollTop = pane.scrollHeight; }
}

function toggleAS() {
  autoScroll = !autoScroll;
  document.getElementById('asbtn').classList.toggle('on', autoScroll);
}

function fmtTelem(m) {
  return `Throttle:${(m.throttle||0).toFixed(2)}  Brake:${(m.brake||0).toFixed(2)}  Steer:${(m.steeringAngle||0).toFixed(3)}rad  Speed:${(m.speed||0).toFixed(1)}mph`;
}

// ── Toast ────────────────────────────────────────────────
let toastT = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Mock animation ───────────────────────────────────────
function mockTick() {
  if (mockPaused) return;
  mockTime += 0.05;
  const t = Math.max(0, Math.min(1, 0.6 + 0.35*Math.sin(mockTime*0.7)));
  const b = Math.max(0, Math.min(1, Math.max(0, -Math.sin(mockTime*0.7+Math.PI))*0.8));
  const s = 3.5*Math.sin(mockTime*0.4);
  setTelem(t, b, s);
  const pct = (38 + 18*Math.sin(mockTime*0.04)).toFixed(1);
  document.getElementById('scrub-fill').style.width = pct + '%';
  const frame = Math.round(21000 + 4000*Math.sin(mockTime*0.04));
  document.getElementById('frame-cur').textContent = 'Frame ' + frame.toLocaleString();
  // Emit mock telemetry log line occasionally
  if (Math.round(mockTime*20)%40 === 0) {
    log('telem','DATA ','telemetry', `Throttle:${t.toFixed(2)}  Brake:${b.toFixed(2)}  Steer:${s.toFixed(3)}rad`);
  }
}

// ── Seed mock logs ────────────────────────────────────────
function seedLogs() {
  [
    ['event','EVENT','session_start',    'WeekendInfo: Monza GP  SimMode:replay'],
    ['event','INFO ','replay_position',  'Frame 0 of 55000  ratio:0.000'],
    ['event','EVENT','incident',         '#99 J. Smith  +4x  contact (wall)  frame:54321'],
    ['event','INFO ','replay_position',  'Frame 12100 of 55000  ratio:0.220'],
    ['event','EVENT','incident',         '#12 A. Jones  +2x  wall  frame:52100'],
    ['event','EVENT','incident',         '#42 B. Lee    +1x  off-track  frame:48900'],
    ['event','EVENT','flag_change',      'Yellow  sector:3'],
    ['event','EVENT','incident',         '#7 M. Wilson  +4x  contact  frame:45200'],
    ['event','INFO ','replay_position',  'Frame 21234 of 55000  ratio:0.386'],
  ].forEach(([t,l,e,m]) => log(t,l,e,m));

  [
    ['health','INFO ','plugin_started',      'SimSteward plugin starting'],
    ['health','INFO ','irsdk_started',       'iRacing SDK started successfully'],
    ['health','INFO ','bridge_starting',     'WebSocket bridge starting  bind:0.0.0.0  port:19847'],
    ['health','INFO ','plugin_ready',        'SimSteward ready  ws_port:19847'],
    ['health','INFO ','iracing_connected',   'iRacing connected'],
    ['health','WARN ','broadcast_no_clients','Broadcast skipped: 0 connected clients'],
    ['health','INFO ','ws_client_connected', 'client connected  ip:127.0.0.1  count:1'],
  ].forEach(([t,l,e,m]) => log(t,l,e,m));

  [
    ['telem','DATA ','telemetry','Throttle:0.65  Brake:0.00  Steer: 0.300rad  Speed:145.2mph'],
    ['telem','DATA ','telemetry','Throttle:0.72  Brake:0.00  Steer:-0.120rad  Speed:148.7mph'],
    ['telem','DATA ','telemetry','Throttle:0.00  Brake:0.82  Steer: 1.450rad  Speed:132.1mph'],
    ['telem','DATA ','telemetry','Throttle:0.00  Brake:0.95  Steer: 2.100rad  Speed: 87.4mph'],
    ['telem','DATA ','telemetry','Throttle:0.35  Brake:0.10  Steer: 1.950rad  Speed: 65.0mph'],
    ['telem','DATA ','telemetry','Throttle:0.88  Brake:0.00  Steer: 0.500rad  Speed: 89.3mph'],
  ].forEach(([t,l,e,m]) => log(t,l,e,m));
}

// ── Init ─────────────────────────────────────────────────
function init() {
  renderInc();
  renderStd();
  seedLogs();
  setTelem(mockTelem.t, mockTelem.b, mockTelem.s);
  setInterval(mockTick, 50);
  connectWs();
}
document.addEventListener('DOMContentLoaded', init);
</script>

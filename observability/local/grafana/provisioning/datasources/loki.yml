apiVersion: 1

datasources:
  - name: Loki Local
    type: loki
    uid: loki_local
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      derivedFields:
        - matcherRegex: '"event"\s*:\s*"([^"]+)"'
          name: Event
        - matcherRegex: '"correlation_id"\s*:\s*"([^"]+)"'
          name: Correlation ID
          datasourceUid: loki_local
          url: '{app="sim-steward"} | json | correlation_id = "$${__value.raw}"'
          urlDisplayLabel: Trace by correlation
        - matcherRegex: '"session_id"\s*:\s*"([^"]+)"'
          name: Session ID
          datasourceUid: loki_local
          url: '{app="sim-steward"} | json | session_id = "$${__value.raw}"'
          urlDisplayLabel: All events this session
        - matcherRegex: '"action"\s*:\s*"([^"]+)"'
          name: Action
        - matcherRegex: '"success"\s*:\s*"([^"]+)"'
          name: Success
        - matcherRegex: '"trigger"\s*:\s*"([^"]+)"'
          name: Trigger
        - matcherRegex: '"incident_type"\s*:\s*"([^"]+)"'
          name: Incident type
        - matcherRegex: '"driver_name"\s*:\s*"([^"]+)"'
          name: Driver name
        - matcherRegex: '"car_number"\s*:\s*"([^"]+)"'
          name: Car number
        - matcherRegex: '"incident_id"\s*:\s*"([^"]+)"'
          name: Incident ID
          datasourceUid: loki_local
          url: '{app="sim-steward"} | json | incident_id = "$${__value.raw}"'
          urlDisplayLabel: All events this incident

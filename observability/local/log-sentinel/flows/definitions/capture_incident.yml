name: capture_incident
display_name: Capture Incident
description: User triggers capture_incident, plugin records the incident and reports success.
source_doc: docs/RULES-ActionCoverage.md
steps:
  - id: capture_dispatched
    event: action_dispatched
    label: Capture incident dispatched
    filters:
      action: capture_incident
    timeout_sec: 0
    optional: false
    next:
      - capture_result
  - id: capture_result
    event: action_result
    label: Capture incident succeeded
    filters:
      action: capture_incident
      success: "true"
    timeout_sec: 5
    optional: false
    next: []
expected_completion_sec: 10
gap_severity: warn

name: walk_driver
display_name: Walk Driver Incidents
description: User triggers find-driver-incidents, plugin seeks to each, results returned.
source_doc: docs/RULES-ActionCoverage.md
steps:
  - id: trigger
    event: action_dispatched
    label: Find driver incidents triggered
    filters:
      action: find_driver_incidents
    timeout_sec: 0
    optional: false
    next:
      - seek_dispatched
  - id: seek_dispatched
    event: action_dispatched
    label: Seek to incident dispatched
    filters:
      action: seek_to_incident
    timeout_sec: 10
    optional: false
    next:
      - results
  - id: results
    event: action_result
    label: Driver walk results
    filters:
      action: find_driver_incidents
    timeout_sec: 30
    optional: false
    next: []
expected_completion_sec: 60
gap_severity: warn

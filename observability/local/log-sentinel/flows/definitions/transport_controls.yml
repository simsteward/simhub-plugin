name: transport_controls
display_name: Transport Controls
description: >
  User triggers a replay transport action (jump, speed, or seek).
  The plugin dispatches the action and expects a result promptly.
source_doc: USER-FLOWS.md#flow-7-transport-controls

steps:
  - id: transport_dispatched
    event: action_dispatched
    label: Transport action dispatched
    filters: {}
    timeout_sec: 0
    optional: false
    next:
      - transport_result

  - id: transport_result
    event: action_result
    label: Transport action result
    filters: {}
    timeout_sec: 5
    optional: false
    next: []

expected_completion_sec: 10
gap_severity: info

services:
  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - ${GRAFANA_STORAGE_PATH:-S:/sim-steward-grafana-storage}/loki:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  loki-gateway:
    image: nginx:1.27-alpine
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "3500:3500"
    env_file:
      - .env.observability.local
    environment:
      - LOKI_PUSH_TOKEN=${LOKI_PUSH_TOKEN:-}
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3500/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_HIDE_VERSION=true
    volumes:
      - ${GRAFANA_STORAGE_PATH:-S:/sim-steward-grafana-storage}/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  data-api:
    build: ./data-api
    ports:
      - "8080:8080"
    environment:
      - SIMSTEWARD_DB_PATH=/data/simsteward.db
    volumes:
      - ${GRAFANA_STORAGE_PATH:-S:/sim-steward-grafana-storage}/data-api:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  log-sentinel:
    build: ./log-sentinel
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - LOKI_URL=http://loki:3100
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_USER=${GRAFANA_ADMIN_USER:-admin}
      - GRAFANA_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL_FAST=deepseek-r1:8b
      - OLLAMA_MODEL_DEEP=llama3.3:70b-instruct-q4_K_M
      - SENTINEL_POLL_INTERVAL_SEC=60
      - SENTINEL_LOOKBACK_SEC=300
      - SENTINEL_T2_ENABLED=true
      - SIMSTEWARD_LOG_ENV=${SIMSTEWARD_LOG_ENV:-local}
    volumes:
      - ${GRAFANA_STORAGE_PATH:-S:/sim-steward-grafana-storage}/log-sentinel:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

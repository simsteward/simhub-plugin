name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: windows-latest

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # github/codeql-action/init@v3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
        with:
          languages: csharp
          queries: security-extended

      # github/codeql-action/autobuild@v3
      - name: Autobuild
        uses: github/codeql-action/autobuild@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3

      # github/codeql-action/analyze@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ebcb5b36ded6beda4ceefea6a8bc4cc885255bb3
        with:
          category: "/language:csharp"

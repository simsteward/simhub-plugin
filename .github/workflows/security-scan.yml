name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run Semgrep
        run: semgrep scan --config "p/csharp" --config "p/secrets" --config "p/owasp-top-ten" --config "p/javascript" --sarif --output semgrep-results.sarif

      # github/codeql-action/upload-sarif@v3
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
